{% extends "base.html" %}

{% block title %}Trace Replay - AppSimple{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/assets/css/chat-ui.css" />
<link rel="stylesheet" href="/assets/css/pages/replay.css" />
{% endblock %}

{% block content %}
<div class="replay-page">
    <div class="replay-header">
        <a href="/" class="replay-back">&larr; Home</a>
        <h1 class="replay-title">Trace Replay</h1>
    </div>

    <div class="replay-controls">
        <input type="text" id="trace-search" class="replay-search" placeholder="Search traces..." autocomplete="off" />
        <select id="trace-select" class="replay-select">
            <option value="">Select a trace...</option>
        </select>
    </div>

    <div id="replay-output" class="replay-output" style="display: none;">
        <div class="chat-turn">
            <div class="chat-question" id="replay-question"></div>
            <div class="chat-answer" id="replay-answer"></div>
            <div id="replay-sources-container"></div>
            <div class="chat-stats" id="replay-stats"></div>
            <button class="chat-trace-toggle" id="replay-trace-toggle" style="display:none" onclick="this.nextElementSibling.classList.toggle('open')">trace</button>
            <div class="chat-trace" id="replay-trace"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/assets/js/chat-ui.js"></script>
<script>
(function() {
    var API_BASE = 'https://chuckfinca-appsimple-assistant.hf.space';
    var select = document.getElementById('trace-select');
    var search = document.getElementById('trace-search');
    var output = document.getElementById('replay-output');

    function loadTraces(query) {
        callApi(API_BASE, 'traces', query || '').then(function(data) {
            if (data.error) return;
            select.innerHTML = '<option value="">Select a trace...</option>';
            data.traces.forEach(function(f) {
                var label = f.replace('.json', '').replace(/^\d{8}-\d{6}-\d+_?/, '').replace(/-/g, ' ') || f;
                var date = f.substring(0, 8);
                var dateStr = date.substring(0, 4) + '-' + date.substring(4, 6) + '-' + date.substring(6, 8);
                var opt = document.createElement('option');
                opt.value = f;
                opt.textContent = dateStr + '  ' + label;
                select.appendChild(opt);
            });
        });
    }

    // Load and render a trace
    function loadTrace(filename) {
        if (!filename) {
            output.style.display = 'none';
            return;
        }
        output.style.display = 'block';
        document.getElementById('replay-question').textContent = 'Loading...';
        document.getElementById('replay-answer').innerHTML = '';
        document.getElementById('replay-sources-container').innerHTML = '';
        document.getElementById('replay-stats').textContent = '';
        document.getElementById('replay-trace-toggle').style.display = 'none';
        document.getElementById('replay-trace').innerHTML = '';

        callApi(API_BASE, 'replay', filename).then(function(data) {
            if (data.error) {
                document.getElementById('replay-question').textContent = 'Error: ' + data.error;
                return;
            }

            document.getElementById('replay-question').textContent = data.question;
            document.getElementById('replay-answer').innerHTML = markdownToHtml(data.answer);

            document.getElementById('replay-sources-container').innerHTML = renderSources(data.sources, { docLinkBase: '/doc/' });

            document.getElementById('replay-stats').textContent = data.stats;
            if (data.source_tag) {
                document.getElementById('replay-stats').textContent += ' · ' + data.source_tag;
            }

            var traceToggle = document.getElementById('replay-trace-toggle');
            var traceEl = document.getElementById('replay-trace');
            if (data.trace_html) {
                traceToggle.style.display = '';
                traceEl.innerHTML = data.trace_html;
                traceEl.classList.remove('open');
            } else {
                traceToggle.style.display = 'none';
                traceEl.innerHTML = '';
            }
        });
    }

    // Event listeners
    select.addEventListener('change', function() { loadTrace(select.value); });

    var searchTimeout;
    search.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(function() { loadTraces(search.value); }, 300);
    });

    // Initial load
    loadTraces();
})();
</script>
{% endblock %}
